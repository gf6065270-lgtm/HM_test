;基于这些配置，pytest 会：
;自动发现 scripts/ 目录下所有匹配 tes*.py 的文件
;自动执行 这些文件中 Test* 类的 test* 方法
;显示输出 所有 print 语句的内容（因为 -s 参数）
;✅ 验证示例
;对于 scripts/test_verifty.py：
;✅ 文件名 test_verifty.py 匹配 tes*.py → 会被发现
;✅ 类名 Test_less1 匹配 Test* → 会被识别
;✅ 方法名 test_add1、test_2、test_add2 匹配 test* → 会被执行
[pytest]
# 添加命令行参数
addopts =  -s --alluredir=./allure-results
# 文件搜索路径
testpaths =jiekou_ziodng_test
# 文件名称
python_files = tes*.py
# 类名称
python_classes = Test*
# 方法名称
python_functions = test*